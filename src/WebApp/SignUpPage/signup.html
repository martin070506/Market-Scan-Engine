<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Mar-Stocks | ML Intelligence</title>
    <link rel="stylesheet" href="signup.css">
</head>

<body>
    <div class="split-container">
        <div class="form-panel">
            <div class="top-brand">
                <img src="../assets/brand-logo.png" alt="Mar-Stocks Logo">
                <span>Mar-Stocks</span>
            </div>

            <div class="auth-content">
                <h2>Create Account</h2>
                <p class="subtitle">Join the ML Stock Community Terminal</p>

                <div id="signup-form">
                    <div class="input-group">
                        <input type="email" id="reg-email" placeholder="name@example.com" required>
                    </div>
                    <div class="input-group">
                        <input type="password" id="reg-password" placeholder="Create Password" required>
                    </div>
                    <div class="input-group">
                        <input type="password" id="reg-confirm" placeholder="Repeat Password" required>
                    </div>
                    <button class="btn-main" id="signup-button">Get Early Access</button>
                </div>

                <p class="toggle-text">Already a member? <a href="../LoginPage/login.html">Log In</a></p>
            </div>
        </div>


    </div>

    <script type="module" src="signup.js"></script>
</body>

</html>
