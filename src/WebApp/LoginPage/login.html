<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Mar-Stocks Terminal</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>
    <div class="split-container">
        <div class="form-panel">
            <div class="top-brand">
                <img src="../assets/brand-logo.png" alt="Mar-Stocks Logo">
                <span>Mar-Stocks</span>
            </div>

            <div class="auth-content">
                <h2>Welcome back!</h2>
                <p class="subtitle">Launch the ML Market Scanner</p>

                <div id="login-form">
                    <div class="input-group">
                        <input type="email" id="log-email" placeholder="Email address" required>
                    </div>
                    <div class="input-group">
                        <input type="password" id="log-pass" placeholder="Password" required>
                    </div>
                    <button type="submit" class="btn-main" id="log-btn">Launch Terminal</button>
                </div>

                <p class="toggle-text">New to Mar-Stocks? <a href="../SignUpPage/signup.html">Create Account</a></p>
            </div>
        </div>


    </div>

    <script type="module" src="login.js"></script>
</body>

</html>
